services:
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    ports:
      - "127.0.0.1:3080:3080"
    environment:
      - NODE_ENV=production
      - ALLOW_REGISTRATION=true
      - HOST=0.0.0.0
      - PORT=3080
      - MONGO_URI=mongodb://librechat-db:27017/LibreChat
      - JWT_SECRET='nP7HUK9z2a1Vcc8ITmh0i0ul15qi1n0Xw7POmd6HlNo='
      - JWT_REFRESH_SECRET='hy6HOP89CIuwUtPoxDxuWhYsgMKwmeFORSPEJrB5hBo='
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDINGS_PROVIDER=ollama
      - EMBEDDINGS_MODEL=nomic-embed-text
    volumes:
      - ./conf/librechat.yaml:/app/librechat.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - librechat-db
      - rag-server
      - ollama

  librechat-db:
    container_name: librechat-db
    image: mirror.gcr.io/mongo:8.0.20
    restart: unless-stopped
    volumes:
      - librechat-db-data:/data/db
    command: mongod --noauth

  rag-server:
    container_name: rag-server
    restart: unless-stopped
    build:
      context: .
    environment:
      GRAPHDB_ENDPOINT: http://graphdb:7200/repositories/myrepo
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      EMBEDDING_MODEL: nomic-embed-text
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - "$HOME/projects/personal/kg-rag/bin/rag-server:/app/bin/rag-server:ro"
    depends_on:
      graphdb:
        condition: service_healthy
      ollama:
        condition: service_healthy

  graphdb:
    image: mirror.gcr.io/ontotext/graphdb:10.6.4
    container_name: graphdb
    restart: unless-stopped
    environment:
      - GDB_JAVA_OPTS=-Xmx2g -Xms2g
    volumes:
      - graphdb-data:/opt/graphdb/home
    healthcheck:
      test: curl -f http://localhost:7200/rest/repositories || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  graphdb-init:
    image: mirror.gcr.io/ontotext/graphdb:10.6.4
    container_name: graphdb-init
    restart: on-failure
    entrypoint: ["/bin/bash", "-c"]
    command: /init.sh
    environment:
      REPOSITORY_ID: myrepo
      GRAPHDB_HOST: graphdb
      GRAPHDB_PORT: 7200
    volumes:
      - ./conf/graphdb/init.sh:/init.sh
      - ./conf/graphdb/repository.ttl:/repository.ttl
      - ./conf/graphdb/data.ttl:/data.ttl
    depends_on:
      graphdb:
        condition: service_healthy

  ollama:
    image: mirror.gcr.io/ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  librechat-db-data:
  graphdb-data:
  ollama-data:
